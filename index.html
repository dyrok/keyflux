<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta
      name="description"
      content="KeyFlux — a precise virtual keyboard layout & typing speed meter with live telemetry, friction heatmaps, and per-key analytics."
    />
    <title>KeyFlux · Typing Analytics Lab</title>
    <!-- no-flash theme application: runs before paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('keyflux:theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
